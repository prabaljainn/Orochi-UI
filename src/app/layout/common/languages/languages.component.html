<button
	mat-icon-button
	[matMenuTriggerFor]="languages">
	<span class="relative">
		<div>
			<mat-icon
				class="cursor-pointer text-[#94A3B8] icon-size-5"
				[svgIcon]="'heroicons_solid:language'"
			></mat-icon>
		</div>
	</span>
</button>

<!-- Language menu -->
<mat-menu
    [xPosition]="'before'"
    #languages="matMenu">
	@for (lang of languageList; track lang.code) {
		<button
			mat-menu-item 
			(click)="handleLanguageSelection(lang.code)"
		>
			@if (languageOption === lang.code) {
			<mat-icon
				class="cursor-pointer text-primary icon-size-5"
				[svgIcon]="'heroicons_solid:check'"
			></mat-icon>
			}
			<span class="flex items-center">
				<mat-icon class="icon-size-6" [svgIcon]="lang.icon"></mat-icon>
				<span>{{lang.name}}</span>
			</span>
	</button>
	}
</mat-menu>

<!-- Flag image template -->
<ng-template
    let-lang
    #flagImage>
    <span class="relative w-6 shadow rounded-sm overflow-hidden">
        <span class="absolute inset-0 ring-1 ring-inset ring-black ring-opacity-10"></span>
        <img
            class="w-full"
            [src]="'assets/images/flags/' + flagCodes[lang].toUpperCase() + '.svg'"
            [alt]="'Flag image for ' + lang">
    </span>
</ng-template>
