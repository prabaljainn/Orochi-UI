<div class="frame-annotator-container relative">
    <!-- Loading State -->
    @if (loading) {
    <div class="annotation-viewer">
        <img src="assets/images/logo/train-loader.gif" alt="Train Loader" />
    </div>
    }

    <!-- Error State -->
    @if (error) {
    <div
        class="error-message absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50"
    >
        {{ error }}
    </div>
    }

    <!-- Main Content -->
    @if (frameData && !loading) {
    <div class="annotation-viewer">
        <!-- Base Image -->
        <div
            class="image-container"
            [style.width.px]="displayWidth()"
            [style.height.px]="displayHeight()"
        >
            <img
                [src]="frameImageUrl"
                [style.width.px]="displayWidth()"
                [style.height.px]="displayHeight()"
                class="base-image"
                alt="Frame {{ frameNumber() }}"
            />

            <!-- SVG Annotation Overlay -->
            <svg
                class="annotation-overlay"
                [attr.width]="displayWidth()"
                [attr.height]="displayHeight()"
                [attr.viewBox]="'0 0 ' + displayWidth() + ' ' + displayHeight()"
            >
                <!-- Rectangles -->
                <g class="rectangles-group">
                    @for (shape of rectangles; track shape.id) {
                    <g
                        [attr.data-shape-id]="shape.id"
                        [attr.data-label]="shape.label"
                    >
                        <rect
                            [attr.x]="shape.rectProps?.x"
                            [attr.y]="shape.rectProps?.y"
                            [attr.width]="shape.rectProps?.width"
                            [attr.height]="shape.rectProps?.height"
                            [attr.stroke]="shape.color"
                            [attr.stroke-width]="2"
                            [attr.fill]="shape.color"
                            [attr.fill-opacity]="0.1"
                            [class.occluded]="shape.occluded"
                            class="annotation-rectangle"
                        />

                        <!-- Rectangle Label -->
                        <text
                            [attr.x]="shape.rectProps?.x"
                            [attr.y]="(shape.rectProps?.y ?? 0) - 5"
                            [attr.fill]="shape.color"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Polygons -->
                <g class="polygons-group">
                    @for (shape of polygons; track shape.id) {
                    <g [attr.data-shape-id]="shape.id">
                        <path
                            [attr.d]="shape.svgPath"
                            [attr.stroke]="shape.color"
                            [attr.stroke-width]="2"
                            [attr.fill]="shape.color"
                            [attr.fill-opacity]="0.1"
                            [class.occluded]="shape.occluded"
                            class="annotation-polygon"
                        />

                        <!-- Polygon Label -->
                        <text
                            [attr.x]="shape.scaledPoints[0]"
                            [attr.y]="shape.scaledPoints[1] - 5"
                            [attr.fill]="shape.color"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Polylines -->
                <g class="polylines-group">
                    @for(shape of polylines; track shape.id) {
                    <g [attr.data-shape-id]="shape.id">
                        <path
                            [attr.d]="shape.svgPath"
                            [attr.stroke]="shape.color"
                            [attr.stroke-width]="2"
                            [attr.fill]="none"
                            [class.occluded]="shape.occluded"
                            class="annotation-polyline"
                        />

                        <!-- Polyline Label -->
                        <text
                            [attr.x]="shape.scaledPoints[0]"
                            [attr.y]="shape.scaledPoints[1] - 5"
                            [attr.fill]="shape.color"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Points -->
                <g class="points-group">
                    @for (shape of points; track shape.id) {
                    <g [attr.data-shape-id]="shape.id">
                        @for (point of shape.pointPairs; let i
                        = $index; track i) {
                        <g>
                            <circle
                                [attr.cx]="point.x"
                                [attr.cy]="point.y"
                                [attr.r]="4"
                                [attr.fill]="shape.color"
                                [attr.stroke]="'white'"
                                [attr.stroke-width]="1"
                                [class.occluded]="shape.occluded"
                                class="annotation-point"
                            />

                            <!-- Point number -->
                            <text
                                [attr.x]="point.x + 8"
                                [attr.y]="point.y + 4"
                                [attr.fill]="shape.color"
                                class="point-number"
                            >
                                {{ i + 1 }}
                            </text>
                        </g>
                        }

                        <!-- Points Label -->
                        <text
                            [attr.x]="shape.scaledPoints[0]"
                            [attr.y]="shape.scaledPoints[1] - 10"
                            [attr.fill]="shape.color"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Ellipses -->
                <g class="ellipses-group">
                    @for (shape of ellipses; track shape.id) {
                    <g [attr.data-shape-id]="shape.id">
                        <ellipse
                            [attr.cx]="shape.ellipseProps?.cx"
                            [attr.cy]="shape.ellipseProps?.cy"
                            [attr.rx]="shape.ellipseProps?.rx"
                            [attr.ry]="shape.ellipseProps?.ry"
                            [attr.stroke]="shape.color"
                            [attr.stroke-width]="2"
                            [attr.fill]="shape.color"
                            [attr.fill-opacity]="0.1"
                            [class.occluded]="shape.occluded"
                            class="annotation-ellipse"
                        />

                        <!-- Ellipse Label -->
                        <text
                            [attr.x]="shape.ellipseProps?.cx"
                            [attr.y]="
                                (shape.ellipseProps?.cy ?? 0) -
                                (shape.ellipseProps?.ry ?? 0) -
                                5
                            "
                            [attr.fill]="shape.color"
                            [attr.text-anchor]="middle"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Cuboids -->
                <g class="cuboids-group">
                    @for (shape of cuboids; track shape.id) {
                    <g [attr.data-shape-id]="shape.id">
                        <path
                            [attr.d]="shape.svgPath"
                            [attr.stroke]="shape.color"
                            [attr.stroke-width]="2"
                            [attr.fill]="none"
                            [class.occluded]="shape.occluded"
                            class="annotation-cuboid"
                        />

                        <!-- Cuboid Label -->
                        <text
                            [attr.x]="shape.scaledPoints[0]"
                            [attr.y]="shape.scaledPoints[1] - 5"
                            [attr.fill]="shape.color"
                            class="annotation-label"
                        >
                            {{ shape.label }}
                        </text>
                    </g>
                    }
                </g>

                <!-- Track Indicators (for tracked shapes) -->
                <g class="track-indicators">
                    @for (track of scaledTracks; track track.id) {
                    <g>
                        <circle
                            [attr.cx]="track.scaledPoints[0]"
                            [attr.cy]="track.scaledPoints[1]"
                            [attr.r]="6"
                            [attr.fill]="track.color"
                            [attr.stroke]="white"
                            [attr.stroke-width]="2"
                            class="track-indicator"
                        >
                            <title>Track {{ track.trackId }}</title>
                        </circle>

                        <text
                            [attr.x]="track.scaledPoints[0]"
                            [attr.y]="track.scaledPoints[1] + 4"
                            [attr.text-anchor]="middle"
                            [attr.fill]="white"
                            class="track-id"
                        >
                            {{ track.trackId }}
                        </text>
                    </g>
                    }
                </g>
            </svg>
        </div>

        <!-- Tags Display -->
        @if (frameData.annotations.tags.length > 0) {
        <div class="tags-container">
            <h4>Frame Tags:</h4>
            <div class="tags-list">
                @for (tag of frameData.annotations.tags; track tag.id) {
                <span
                    class="tag-chip"
                    [style.background-color]="getLabelColor(tag.label)"
                >
                    {{ tag.label }}
                </span>
                }
            </div>
        </div>
        }
    </div>
    }
</div>
