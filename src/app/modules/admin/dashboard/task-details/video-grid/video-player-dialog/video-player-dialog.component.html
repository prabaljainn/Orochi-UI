<div class="w-full flex flex-col gap-4 rounded-md">
    <!-- header -->
    <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <h3 class="text-lg font-semibold">{{ filename }}</h3>
            <span class="text-sm text-gray-500"
                >• {{ formatTime(currentTime) }} /
                {{ formatTime(duration) }}</span
            >
        </div>

        <div class="flex items-center gap-2">
            <button (click)="close()" class="px-3 py-1 rounded border text-sm">
                Close
            </button>
        </div>
    </div>

    <!-- Main Content: Buttons + Video -->
    <div class="flex items-center gap-4 w-full">
        <!-- Prev Button -->
        <div
            class="p-1 bg-card-secondary rounded-full hover:scale-125 transition-all duration-300"
        >
            <button
                class="w-8 h-8 px-2 py-1 rounded-full bg-card flex items-center justify-center disabled:opacity-60 disabled:cursor-not-allowed"
                (click)="prevVideo()"
                [disabled]="!hasPrev"
            >
                <mat-icon
                    class="icon-size-4 text-default cursor-pointer disabled:cursor-not-allowed"
                    i18n-matTooltip
                    matTooltip="Previous Video"
                    svgIcon="heroicons_solid:chevron-left"
                >
                </mat-icon>
            </button>
        </div>

        <!-- video area -->
        <div class="flex-1 bg-black rounded-md overflow-hidden relative group">
            <div
                #videoWrapper
                (click)="togglePlay()"
                (pointerdown)="onMainPointerDown($event)"
                (pointermove)="onMainPointerMove($event)"
                (pointerup)="onMainPointerUp($event)"
                (pointercancel)="onMainPointerUp($event)"
                class="w-full h-[70vh] flex items-center justify-center bg-black touch-none relative cursor-pointer origin-center"
                style="transition: transform 0.08s linear"
            >
                <!-- Loader -->
                <div
                    *ngIf="isLoading"
                    class="absolute inset-0 flex items-center justify-center z-50 pointer-events-none"
                >
                    <app-bouncy-loader></app-bouncy-loader>
                </div>

                <video
                    #videoRef
                    [src]="safeUrl"
                    playsinline
                    autoplay
                    preload="auto"
                    muted
                    loop
                    class="w-full h-full object-contain pointer-events-none"
                ></video>
            </div>

            <!-- Minimap Overlay (Only visible when zoomed) -->
            <div
                *ngIf="zoom > 1"
                class="absolute bottom-4 right-4 w-48 aspect-video bg-black/50 border border-white/20 rounded shadow-lg overflow-hidden z-[100] transition-opacity duration-300"
            >
                <div class="relative w-full h-full">
                    <!-- Minimap Video (Muted, Synced) -->
                    <video
                        #minimapVideoRef
                        [src]="safeUrl"
                        playsinline
                        muted
                        class="w-full h-full object-cover opacity-60 pointer-events-none"
                    ></video>

                    <!-- Viewport Rectangle -->
                    <div
                        class="absolute border-2 border-primary bg-primary/20 hover:bg-primary/30 cursor-move transition-colors duration-150"
                        [style.left.%]="viewportLeftPercent"
                        [style.top.%]="viewportTopPercent"
                        [style.width.%]="viewportWidthPercent"
                        [style.height.%]="viewportHeightPercent"
                        (pointerdown)="onMinimapPointerDown($event)"
                        (pointermove)="onMinimapPointerMove($event)"
                        (pointerup)="onMinimapPointerUp($event)"
                        (pointercancel)="onMinimapPointerUp($event)"
                    ></div>
                </div>
            </div>
        </div>

        <!-- Next Button -->
        <div
            class="p-1 bg-card-secondary rounded-full hover:scale-125 transition-all duration-300"
        >
            <button
                class="w-8 h-8 px-2 py-1 rounded-full bg-card flex items-center disabled:opacity-60 disabled:cursor-not-allowed"
                (click)="nextVideo()"
                [disabled]="!hasNext"
            >
                <mat-icon
                    class="icon-size-4 text-default"
                    i18n-matTooltip
                    matTooltip="Next Video"
                    svgIcon="heroicons_solid:chevron-right"
                >
                </mat-icon>
            </button>
        </div>
    </div>

    <!-- controls -->
    <div class="flex flex-col gap-3">
        <!-- playback + frame controls -->
        <div class="flex flex-wrap items-center gap-3">
            <div class="p-1 bg-card-secondary rounded-full">
                <div
                    class="px-2 py-1 rounded-full bg-card flex items-center gap-2"
                >
                    <!-- Prev frame -->
                    <button
                        class="flex justify-center items-center"
                        (click)="stepFrame(-1)"
                    >
                        <mat-icon
                            class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                            [svgIcon]="'sudocode:double-arrow-left'"
                            i18n-matTooltip
                            matTooltip="Previous Frame"
                        ></mat-icon>
                    </button>

                    <!-- Play/Pause -->
                    <button
                        class="flex justify-center items-center"
                        (click)="togglePlay()"
                    >
                        <!-- Play -->
                        <mat-icon
                            class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                            *ngIf="!playing"
                            i18n-matTooltip
                            matTooltip="Play"
                        >
                            play_circle
                        </mat-icon>
                        <!-- Pause -->
                        <mat-icon
                            class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                            *ngIf="playing"
                            i18n-matTooltip
                            matTooltip="Pause"
                        >
                            pause_circle
                        </mat-icon>
                    </button>

                    <!-- Next frame -->
                    <button
                        class="flex justify-center items-center"
                        (click)="stepFrame(1)"
                        i18n-matTooltip
                        matTooltip="Next Frame"
                    >
                        <mat-icon
                            class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                            [svgIcon]="'sudocode:double-arrow-right'"
                        ></mat-icon>
                    </button>
                </div>
            </div>

            <!-- seek bar (robust bindings) -->
            <div class="flex items-center gap-3 flex-1">
                <input
                    type="range"
                    min="0"
                    [max]="duration || 0"
                    step="0.01"
                    [value]="currentTime"
                    (pointerdown)="onSeekStart()"
                    (input)="onSeekChange($any($event.target).valueAsNumber)"
                    (change)="onSeekEnd($any($event.target).valueAsNumber)"
                    class="w-full accent-primary"
                />
            </div>
        </div>

        <div class="flex justify-between items-center gap-3">
            <!-- playback rate slider -->
            <div class="flex items-center gap-2">
                <label class="text-sm text-secondary">Speed</label>
                <input
                    type="range"
                    min="0.25"
                    max="2"
                    step="0.05"
                    [value]="playbackRate"
                    (input)="setPlaybackRate($any($event.target).valueAsNumber)"
                    class="w-40 accent-primary"
                />
                <div class="w-12 text-sm text-secondary text-center">
                    {{ playbackRate | number : "1.2-2" }}x
                </div>
            </div>

            <!-- zoom controls -->
            <div class="flex items-center gap-3">
                <label class="text-sm text-secondary">
                    Zoom: {{ zoom | number : "1.2-2" }}x
                </label>
                <button
                    (click)="zoomOut()"
                    class="px-2 py-1 rounded border"
                    i18n-matTooltip
                    matTooltip="Zoom Out"
                >
                    -
                </button>
                <input
                    type="range"
                    [min]="minZoom"
                    [max]="maxZoom"
                    step="0.05"
                    [value]="zoom"
                    (input)="setZoom($any($event.target).valueAsNumber)"
                    class="w-40 accent-primary"
                />
                <button
                    (click)="zoomIn()"
                    class="px-2 py-1 rounded border"
                    i18n-matTooltip
                    matTooltip="Zoom In"
                >
                    +
                </button>
                <button
                    (click)="resetZoom()"
                    class="p-2 rounded border flex justify-center items-center"
                >
                    <mat-icon
                        class="icon-size-3 text-default cursor-pointer"
                        i18n-matTooltip
                        matTooltip="Reset Zoom"
                    >
                        replay
                    </mat-icon>
                </button>
            </div>
        </div>
    </div>
</div>
