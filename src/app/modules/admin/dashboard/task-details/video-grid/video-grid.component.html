<div class="flex flex-col gap-4">
    <!-- Video grid: 3 cols x 2 rows = 6 -->
    <div
        class="grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
        style="grid-auto-rows: 18rem"
    >
        <div
            *ngFor="
                let url of safeUrlsOnPage;
                let i = index;
                trackBy: trackByIndex
            "
            class="bg-black rounded-md overflow-hidden flex flex-col items-center justify-center hover:border hover:border-primary transition-all duration-300"
            (click)="openVideoDialog(url)"
        >
            <video
                #videoPlayer
                [src]="url"
                muted
                playsinline
                preload="metadata"
                class="w-full h-[90%] object-cover"
                (error)="console.error('video error', $event)"
                (loadedmetadata)="onMetadataLoaded($event)"
            ></video>
            <div
                class="w-full h-[10%] flex justify-between items-center p-2 bg-card-secondary text-default"
            >
                <div class="text-md font-semibold truncate py-1">
                    {{ safeUrlToVideoMetaMap.get(url)?.filename?.split('.')?.[0] ?? 'Unknown' }}
                </div>
                <button class="flex justify-center items-center">
                    <mat-icon
                        class="icon-size-4 hover:text-primary transition-all duration-300 text-default"
                        svgIcon="sudocode:expand-video"
                    ></mat-icon>
                </button>
            </div>
        </div>

        <!-- If fewer than pageSize items, fill empty slots for consistent layout -->
        <ng-container *ngIf="safeUrlsOnPage.length < pageSize">
            <div
                *ngFor="
                    let _ of [].constructor(pageSize - safeUrlsOnPage.length)
                "
                class="bg-gray-100 rounded-md border"
            ></div>
        </ng-container>
    </div>

    <!-- Bottom controls / status -->
    <div class="flex items-center justify-between text-sm text-gray-600">
        @if(loading){
        <div class="text-right">
            <span class="text-gray-500"> Starting videos… </span>
        </div>
        } @else{
        <div class="p-2 rounded-lg bg-card-secondary flex items-center gap-2">
            <!-- Prev 10 frames -->
            <button
                class="flex justify-center items-center"
                (click)="stepFrame(-10)"
            >
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    i18n-matTooltip
                    matTooltip="Previous 10 Frames"
                >
                    fast_rewind
                </mat-icon>
            </button>

            <!-- Prev frame -->
            <button
                class="flex justify-center items-center"
                (click)="stepFrame(-1)"
            >
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    [svgIcon]="'sudocode:double-arrow-left'"
                    i18n-matTooltip
                    matTooltip="Previous Frame"
                ></mat-icon>
            </button>

            <!-- Play/Pause -->
            <button
                class="flex justify-center items-center"
                (click)="togglePlay()"
            >
                <!-- Play -->
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    *ngIf="!playing"
                    i18n-matTooltip
                    matTooltip="Play"
                >
                    play_circle
                </mat-icon>
                <!-- Pause -->
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    *ngIf="playing"
                    i18n-matTooltip
                    matTooltip="Pause"
                >
                    pause_circle
                </mat-icon>
            </button>

            <!-- Next frame -->
            <button
                class="flex justify-center items-center"
                (click)="stepFrame(1)"
                i18n-matTooltip
                matTooltip="Next Frame"
            >
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    [svgIcon]="'sudocode:double-arrow-right'"
                ></mat-icon>
            </button>

            <!-- Next 10 frames -->
            <button
                class="flex justify-center items-center"
                (click)="stepFrame(10)"
            >
                <mat-icon
                    class="icon-size-6 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    i18n-matTooltip
                    matTooltip="Next 10 Frames"
                >
                    fast_forward
                </mat-icon>
            </button>

            <!-- Reset -->
            <button
                class="flex justify-center items-center"
                (click)="resetVideo()"
            >
                <mat-icon
                    class="icon-size-5 text-default cursor-pointer hover:scale-125 transition-all duration-300"
                    i18n-matTooltip
                    matTooltip="Reset Video"
                >
                    replay
                </mat-icon>
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="flex-1 px-4">
            <input
                type="range"
                [min]="0"
                [max]="maxDuration"
                [value]="currentProgress"
                (input)="onSeek($event)"
                (mousedown)="onSeekStart()"
                (mouseup)="onSeekEnd()"
                class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-primary"
            />
        </div>
        }

        <div class="flex items-center gap-3">
            <button
                (click)="prevPage()"
                [disabled]="currentPage === 0"
                class="px-2 py-1 flex justify-center items-center gap-2 rounded-md border disabled:opacity-50"
            >
                <mat-icon
                    class="icon-size-3"
                    svgIcon="heroicons_outline:chevron-left"
                ></mat-icon>
                Prev
            </button>
            <span>Showing {{ showingRange }} of {{ videos.length }}</span>
            <button
                (click)="nextPage()"
                [disabled]="currentPage + 1 >= totalPages"
                class="px-2 py-1 flex justify-center items-center gap-2 rounded-md border disabled:opacity-50"
            >
                Next
                <mat-icon
                    class="icon-size-3"
                    svgIcon="heroicons_outline:chevron-right"
                ></mat-icon>
            </button>
        </div>
    </div>
</div>
